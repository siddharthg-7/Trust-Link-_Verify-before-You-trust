services:
  - type: web
    name: trust-link-main
    env: node
    plan: free
    buildCommand: npm install && npm run build && pip3 install -r backend/app/requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_SERVICE_URL
        value: http://127.0.0.1:5000/send-email
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
